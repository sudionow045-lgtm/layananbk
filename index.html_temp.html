    <!-- Modal Pertanyaan -->
    <div class="modal fade" id="modalPertanyaan" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Kelola Pertanyaan</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-pertanyaan">
                        <input type="hidden" id="pertanyaan-id">
                        <div class="mb-3">
                            <label class="form-label">Instrumen</label>
                            <select id="pertanyaan-instrumen" class="form-select" required>
                                <option value="DCM">Daftar Cek Masalah (DCM)</option>
                                <option value="Potensi">Kenali Potensi</option>
                                <option value="Minat">Minat Bakat</option>
                                <option value="Gaya">Gaya Belajar</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pertanyaan</label>
                            <textarea id="pertanyaan-teks" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Kategori</label>
                            <input type="text" id="pertanyaan-kategori" class="form-control"
                                placeholder="Contoh: Kesehatan, Belajar, Visual, dll" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Simpan Pertanyaan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
